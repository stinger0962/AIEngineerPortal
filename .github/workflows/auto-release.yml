name: Auto Release & Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: tag
        run: |
          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "previous=$latest" >> "$GITHUB_OUTPUT"
          echo "Bumping $latest -> $next"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.tag }}" -m "Release ${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Build release notes
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          previous="${{ steps.tag.outputs.previous }}"
          {
            echo "# ${tag}"
            echo
            echo "## Summary"
            echo
            if [ -n "$previous" ]; then
              git log --pretty=format:"- %s" "${previous}..${tag}"
            else
              git log --pretty=format:"- %s"
            fi
            echo
            echo
            echo "## Deployment"
            echo
            echo "- Target: https://portal.leipan.cc"
            echo "- Trigger: Push to main (auto-release)"
            echo "- Delivery: GitHub Actions deploy workflow"
          } > release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: release-notes.md

      - name: Deploy on droplet
        uses: appleboy/ssh-action@v1.2.0
        env:
          REPO_URL: "https://github.com/${{ github.repository }}.git"
          DEPLOY_REF: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: REPO_URL,DEPLOY_REF
          script: |
            set -e

            APP_DIR=/opt/ai-engineer-portal
            ENV_FILE="$APP_DIR/infra/.env.production"

            write_env() {
              mkdir -p "$APP_DIR/infra"
              printf '%s\n' \
                'APP_DOMAIN=${{ secrets.APP_DOMAIN }}' \
                'POSTGRES_DB=${{ secrets.POSTGRES_DB }}' \
                'POSTGRES_USER=${{ secrets.POSTGRES_USER }}' \
                'POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}' \
                > "$ENV_FILE"
            }

            write_env

            if [ ! -d "$APP_DIR/.git" ] || [ ! -f "$APP_DIR/scripts/deploy-on-server.sh" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
              write_env
            fi

            export REPO_URL DEPLOY_REF
            chmod +x "$APP_DIR/scripts/deploy-on-server.sh"
            bash "$APP_DIR/scripts/deploy-on-server.sh"

            cd "$APP_DIR"
            git rev-parse --short HEAD
            docker compose --env-file infra/.env.production -f infra/docker-compose.prod.yml ps

      - name: Verify public health
        shell: bash
        run: |
          sleep 10
          for i in 1 2 3; do
            if curl --fail --silent --show-error \
              "https://${{ secrets.APP_DOMAIN }}/health" >/dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 3 attempts"
          exit 1
