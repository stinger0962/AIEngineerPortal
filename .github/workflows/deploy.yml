name: Deploy Portal

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            if [ ! -f /opt/ai-engineer-portal/infra/.env.production ]; then
              echo "ERROR: /opt/ai-engineer-portal/infra/.env.production missing."
              echo "Bootstrap the VPS first: create this file with APP_DOMAIN, POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD."
              exit 1
            fi
            export REPO_URL="https://github.com/${{ github.repository }}.git"
            export DEPLOY_REF="${{ github.sha }}"
            if [ ! -d /opt/ai-engineer-portal/.git ] || [ ! -f /opt/ai-engineer-portal/scripts/deploy-on-server.sh ]; then
              ENV_BACKUP=$(mktemp)
              cp /opt/ai-engineer-portal/infra/.env.production "$ENV_BACKUP"
              rm -rf /opt/ai-engineer-portal
              git clone "${REPO_URL}" /opt/ai-engineer-portal
              mkdir -p /opt/ai-engineer-portal/infra
              cp "$ENV_BACKUP" /opt/ai-engineer-portal/infra/.env.production
              rm -f "$ENV_BACKUP"
            fi
            # Ensure ANTHROPIC_API_KEY is in .env.production
            if ! grep -q "ANTHROPIC_API_KEY" /opt/ai-engineer-portal/infra/.env.production 2>/dev/null; then
              echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> /opt/ai-engineer-portal/infra/.env.production
            fi
            chmod +x /opt/ai-engineer-portal/scripts/deploy-on-server.sh
            bash /opt/ai-engineer-portal/scripts/deploy-on-server.sh
            cd /opt/ai-engineer-portal
            git rev-parse --short HEAD
            docker compose --env-file infra/.env.production -f infra/docker-compose.prod.yml ps

      - name: Verify health via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            sleep 10
            # Check backend health from inside the network (bypasses Cloudflare)
            for i in 1 2 3 4 5; do
              if docker exec infra-backend-1 python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" 2>/dev/null; then
                echo "Backend health check passed on attempt $i"
                break
              fi
              echo "Attempt $i failed, waiting 10s..."
              sleep 10
            done
            # Check all containers are running (not restarting)
            docker compose -f /opt/ai-engineer-portal/infra/docker-compose.prod.yml --env-file /opt/ai-engineer-portal/infra/.env.production ps --format 'table {{.Name}}\t{{.Status}}'
            RESTARTING=$(docker compose -f /opt/ai-engineer-portal/infra/docker-compose.prod.yml --env-file /opt/ai-engineer-portal/infra/.env.production ps --format '{{.Status}}' | grep -c "Restarting" || true)
            if [ "$RESTARTING" -gt 0 ]; then
              echo "ERROR: containers are restarting"
              exit 1
            fi
            echo "All containers healthy"
