name: Deploy Portal

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            if [ ! -f /opt/ai-engineer-portal/infra/.env.production ]; then
              echo "ERROR: /opt/ai-engineer-portal/infra/.env.production missing."
              echo "Bootstrap the VPS first: create this file with APP_DOMAIN, POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD."
              exit 1
            fi
            export REPO_URL="https://github.com/${{ github.repository }}.git"
            export DEPLOY_REF="${{ github.sha }}"
            if [ ! -d /opt/ai-engineer-portal/.git ] || [ ! -f /opt/ai-engineer-portal/scripts/deploy-on-server.sh ]; then
              ENV_BACKUP=$(mktemp)
              cp /opt/ai-engineer-portal/infra/.env.production "$ENV_BACKUP"
              rm -rf /opt/ai-engineer-portal
              git clone "${REPO_URL}" /opt/ai-engineer-portal
              mkdir -p /opt/ai-engineer-portal/infra
              cp "$ENV_BACKUP" /opt/ai-engineer-portal/infra/.env.production
              rm -f "$ENV_BACKUP"
            fi
            chmod +x /opt/ai-engineer-portal/scripts/deploy-on-server.sh
            bash /opt/ai-engineer-portal/scripts/deploy-on-server.sh
            cd /opt/ai-engineer-portal
            git rev-parse --short HEAD
            docker compose --env-file infra/.env.production -f infra/docker-compose.prod.yml ps

      - name: Verify public health
        shell: bash
        run: |
          curl --fail --silent --show-error https://${{ secrets.APP_DOMAIN }}/health >/dev/null
